"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$cmd_duration\
$hostname\
$time\
$line_break\
$character"""

[username]
disabled = true

[hostname]
ssh_only = true
ssh_symbol = "󰣀"
style = "bold #D47766"
format = "[ $ssh_symbol $hostname]($style)"

[package]
disabled = true

[rust]
disabled = true

# Core prompt styling
[character]
success_symbol = "[›](bold #85B695)"
error_symbol = "[›](bold #D47766)"

[directory]
style = "bold #C1A78E"
format = "[ $path]($style)[$read_only]($read_only_style)"
read_only = " 󰌾"
read_only_style = "bold #D47766"

[git_branch]
symbol = ""
style = "bold #85B695"
format = " [›$symbol $branch(:$remote_branch)]($style)"

[git_status]
style = "bold #E49B5D"
format = '([$all_status$ahead_behind]($style))'
staged = '[󰐕 $count](bold #85B695)'
modified = '[󰏫 $count](bold #EBC06D)'
untracked = '[󰋗 $count](bold #89B3B6)'
deleted = '[󰍶 $count](bold #D47766)'
conflicted = '[󰀨 $count](bold #D47766)'
ahead = '[󰁝 $count](bold #85B695)'
behind = '[󰁅 $count](bold #D47766)'
diverged = '[󰁝 $ahead_count 󰁅 $behind_count](bold #E49B5D)'
stashed = '[󰏗 $count](bold #A3A9CE)'

[cmd_duration]
min_time = 500
style = "bold #867462"
format = " [› took $duration]($style)"

[time]
disabled = false
style = "bold #867462"
format = " [› $time 🪴]($style)"
time_format = "%H:%M"

# Language-specific symbols (only for enabled languages)
[c]
symbol = " "

[golang]
symbol = " "

[java]
symbol = " "

[kotlin]
symbol = " "

[python]
symbol = " "

[zig]
symbol = " "

[nix_shell]
symbol = " "

[conda]
symbol = " "
